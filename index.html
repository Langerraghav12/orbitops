<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrbitOps | Advanced Frontend Portfolio Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <p class="eyebrow">Portfolio build</p>
            <h1>OrbitOps</h1>
          </div>
        </div>

        <nav class="nav-list" id="navList" aria-label="Views"></nav>

        <div class="readiness-panel">
          <div class="readiness-ring" aria-hidden="true">
            <span>86</span>
          </div>
          <div>
            <p class="eyebrow">Launch readiness</p>
            <strong>Shipment confidence is improving</strong>
            <small>3 critical workflows left before release.</small>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="search-wrap">
            <span class="search-icon" aria-hidden="true"></span>
            <input
              id="globalSearch"
              type="search"
              placeholder="Search tasks, teams, releases..."
              autocomplete="off"
            />
          </div>

          <div class="topbar-actions">
            <div class="segmented" id="filterGroup" aria-label="Task filter"></div>
            <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle color theme"></button>
            <button class="primary-action" id="newTaskButton" type="button">
              <span class="button-icon" aria-hidden="true"></span>
              New task
            </button>
          </div>
        </header>

        <section class="view-heading" aria-live="polite">
          <div>
            <p class="eyebrow" id="viewKicker">Executive workspace</p>
            <h2 id="viewTitle">Release command center</h2>
          </div>
          <p id="viewSummary">
            Track work, blockers, capacity, and delivery confidence from one focused interface.
          </p>
        </section>

        <section id="metricGrid" class="metric-grid" aria-label="Key metrics"></section>
        <section id="appView" class="app-view"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog class="task-dialog" id="taskDialog" aria-labelledby="dialogTitle">
      <form method="dialog" class="dialog-shell" id="taskForm">
        <div class="dialog-header">
          <div>
            <p class="eyebrow" id="dialogKicker">Task detail</p>
            <h3 id="dialogTitle">Create task</h3>
          </div>
          <button class="icon-button ghost" id="dialogClose" type="button" aria-label="Close dialog"></button>
        </div>

        <label>
          Task title
          <input id="taskTitle" name="title" required maxlength="72" />
        </label>

        <div class="form-grid">
          <label>
            Owner
            <select id="taskOwner" name="owner"></select>
          </label>
          <label>
            Status
            <select id="taskStatus" name="status"></select>
          </label>
          <label>
            Priority
            <select id="taskPriority" name="priority">
              <option>Critical</option>
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
          </label>
          <label>
            Points
            <input id="taskPoints" name="points" type="number" min="1" max="13" value="5" />
          </label>
        </div>

        <label>
          Notes
          <textarea id="taskNotes" name="notes" rows="4"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="secondary-action" id="resolveButton" type="button">Toggle blocker</button>
          <button class="primary-action" value="confirm" type="submit">Save task</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
